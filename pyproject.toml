[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.build_meta"

[project]
name="mxframe"
requires-python=">=3.9"
keywords = ["mojo", "max-engine", "pyarrow", "gpu", "dataframe", "zero-copy"]
dynamic = ["version", "dependencies", "optional-dependencies", "readme", "authors", "classifiers", "entry-points", "scripts", "urls"]
description = "max charged data frame."
license = "Apache-2.0"

[tool.setuptools.dynamic]

[tool.uv]
cache-keys = [{ file = "pyproject.toml" }, { file = "settings.ini" }, { file = "setup.py" }]
