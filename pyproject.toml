[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.build_meta"

[project]
name="mxframe"
requires-python=">=3.9"
keywords = ["mojo", "max-engine", "pyarrow", "gpu", "dataframe", "zero-copy"]
dynamic = ["version", "dependencies", "optional-dependencies", "readme", "classifiers"]
description = "max charged data frame."
license = "Apache-2.0"
authors = [{name = "Abhishek Sreesaila", email = "abhishek.sreesaila@gmail.com"}]

[project.urls]
Homepage = "https://abhisheksreesaila.github.io/mxframe"
Repository = "https://github.com/abhisheksreesaila/mxframe"

[tool.setuptools.dynamic]

[tool.uv]
cache-keys = [{ file = "pyproject.toml" }, { file = "settings.ini" }, { file = "setup.py" }]
